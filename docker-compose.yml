name: chess-game
services:
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess-frontend
    ports:
      - "4200:80"
    depends_on:
      - engine-app

  predict-app:
    build:
      context: ./backend
      dockerfile: predictapp/Dockerfile
    container_name: predict-app
    ports:
      - "${PREDICTAPP_HTTP_PORT:-8000}:${PREDICTAPP_HTTP_PORT:-8000}"
    env_file:
      - backend/.env
    environment:
      - MONGO_HOST=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PREDICTAPP_GRPC_PORT=50053
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  engine-app:
    build:
      context: ./backend/engineapp
      dockerfile: Dockerfile
    container_name: engine-app
    ports:
      - "${ENGINEAPP_HTTP_PORT:-8082}:${ENGINEAPP_HTTP_PORT:-8082}"
      - "${ENGINEAPP_GRPC_PORT:-50051}:${ENGINEAPP_GRPC_PORT:-50051}"
    env_file:
      - backend/.env
    environment:
      - MONGO_HOST=mongodb://mongodb:27017
      - MONGO_DB=${MONGO_DB}
      - REDIS_URL=redis://redis:6379
      - PREDICTAPP_GRPC_HOST=predict-app:50053
    depends_on:
      mongodb:
        condition: service_healthy
      predict-app:
        condition: service_started

  auth-app:
    build:
      context: ./backend/authapp
      dockerfile: Dockerfile
    container_name: auth-app
    ports:
      - "${AUTHAPP_PORT:-3000}:${AUTHAPP_PORT:-3000}"
    env_file:
      - backend/.env
    environment:
      - MONGO_HOST=mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy

  stats-app:
    build:
      context: ./backend/statsapp
      dockerfile: Dockerfile
    container_name: stats-app
    ports:
      - "${STATSAPP_PORT:-8081}:${STATSAPP_PORT:-8081}"
    env_file:
      - backend/.env
    environment:
      - MONGO_HOST=mongodb://mongodb:27017
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  redis:
    image: redis:latest
    container_name: chess-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: chess-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chess-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  mongodb_data:
