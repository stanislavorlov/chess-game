<mat-toolbar class="topbar gap-10">

  <!-- Mobile Menu -->
  
  <button mat-icon-button (click)="toggleMobileNav.emit()" class="d-flex d-lg-none justify-content-center">
    <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Notifications">
    <i-tabler class="d-flex" name="bell" matBadge="1" matBadgeColor="primary"></i-tabler>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item>Item 1</button>
    <button mat-menu-item>Item 2</button>
  </mat-menu>


  <span class="flex-1-auto"></span>

  <div *ngIf="authService.currentUser | async as user; else guestMenu" class="d-flex align-items-center">
      <span class="m-r-8 f-w-600 f-s-14 d-none d-lg-block">{{ user.username }}</span>
      <button mat-mini-fab [matMenuTriggerFor]="profilemenu" aria-label="Profile">
        <img src="/assets/images/profile/user-1.jpg" class="rounded-circle object-cover d-block" width="35" />
      </button>
  </div>

  <ng-template #guestMenu>
    <div class="d-flex align-items-center">
      <a [routerLink]="['/authentication/login']" mat-flat-button color="primary" class="m-r-8">Login</a>
      <a [routerLink]="['/authentication/register']" mat-stroked-button color="primary">Register</a>
    </div>
  </ng-template>

  <mat-menu #profilemenu="matMenu" class="cardWithShadow topbar-dd">
    <button mat-menu-item [routerLink]="['/profile']">
      <mat-icon class="d-flex align-items-center"><i-tabler name="user" class="icon-18 d-flex"></i-tabler></mat-icon>My Profile
    </button>
    <button mat-menu-item [routerLink]="['/stats']">
      <mat-icon class="d-flex align-items-center"><i-tabler name="chart-bar" class="icon-18 d-flex"></i-tabler></mat-icon>My Statistics
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon class="d-flex align-items-center"><i-tabler name="logout" class="icon-18 d-flex"></i-tabler></mat-icon>Logout
    </button>
  </mat-menu>
</mat-toolbar>
