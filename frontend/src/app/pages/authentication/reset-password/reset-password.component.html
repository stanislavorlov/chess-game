<div class="blank-layout-container justify-content-center align-items-center bg-light-primary">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center justify-content-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">
          <div class="text-center">
            <a [routerLink]="['/']">
              <img src="./assets/images/logos/dark-logo.svg" class="align-middle m-2" alt="logo" />
            </a>
          </div>
          <div class="text-center m-b-24">
            <h4 class="f-w-600">Reset Password</h4>
            <span class="d-block f-s-14">Enter your new password below.</span>
          </div>

          <form class="m-t-24" [formGroup]="form" (ngSubmit)="submit()">
            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">New Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="password" />
              <mat-error *ngIf="f.password.errors?.['required']">Password is required</mat-error>
            </mat-form-field>

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Confirm Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="confirmPassword" />
              <mat-error *ngIf="f.confirmPassword.errors?.['required']">Confirmation is required</mat-error>
              <mat-error *ngIf="f.confirmPassword.errors?.['passwordMismatch']">Passwords do not match</mat-error>
            </mat-form-field>

            <div *ngIf="errorMessage" class="text-danger m-b-12">{{errorMessage}}</div>
            <div *ngIf="successMessage" class="text-success m-b-12">{{successMessage}}</div>

            <button type="submit" mat-flat-button color="primary" class="w-100" [disabled]="form.invalid || !token">
              Update Password
            </button>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
