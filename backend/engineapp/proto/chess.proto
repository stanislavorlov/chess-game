syntax = "proto3";

package chess;

option go_package = "github.com/stanislavorlov/chess-game/backend/engineapp/proto;chess";

service ChessEngine {
  rpc ValidateMove (MoveRequest) returns (MoveResponse);
}

message MoveRequest {
  string fen = 1;      
  string move = 2;     
}

message MoveResponse {
  bool is_legal = 1;
  string new_fen = 2;   
  string error = 3;     
}
